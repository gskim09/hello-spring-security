<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">

                    <h3 class="mb-4">비밀번호 변경</h3>

                    <form th:action="@{/user/password}"
                          th:object="${passwordChangeDto}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                현재 비밀번호
                            </label>

                            <input type="password"
                                   th:field="*{currentPassword}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{currentPassword}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                새 비밀번호
                            </label>

                            <input type="password"
                                   th:field="*{newPassword}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{newPassword}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                새 비밀번호 확인
                            </label>

                            <input type="password"
                                   th:field="*{confirmPassword}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{confirmPassword}">
                            </div>
                        </div>

                        <button type="submit"
                                class="btn btn-primary">
                            변경하기
                        </button>

                        <a th:href="@{/home}"
                           class="btn btn-outline-secondary">
                            취소
                        </a>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="container mt-5 mb-3 py-3 border-top text-center text-muted">
    <span>학번: 2071288 | 성명: 김규섭 |</span>

    <span th:text="${' 실습 수행: ' +
        #temporals.format(
            #temporals.createNow(),
            'yyyy-MM-dd HH:mm:ss'
        )}">
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
