<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .08);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="card form-card">
                <div class="card-body p-5">

                    <h3 class="fw-bold mb-4">상품 수정</h3>

                    <form th:action="@{/products/{id}/edit(id=${productId})}"
                          th:object="${productDto}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                상품명
                            </label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{name}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                가격
                            </label>

                            <input type="number"
                                   th:field="*{price}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{price}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                재고
                            </label>

                            <input type="number"
                                   th:field="*{stock}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{stock}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                상품 설명
                            </label>

                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="4">
                            </textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit"
                                    class="btn btn-primary">
                                수정 저장
                            </button>

                            <a th:href="@{/products}"
                               class="btn btn-outline-secondary">
                                취소
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<footer class="container mt-5 mb-3 py-3 border-top text-center text-muted">
    <span>학번: 2071288 | 성명: 김규섭 |</span>

    <span th:text="${' 실습 수행: ' +
        #temporals.format(
            #temporals.createNow(),
            'yyyy-MM-dd HH:mm:ss'
        )}">
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
